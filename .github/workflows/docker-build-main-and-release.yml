name: Docker Build on Main and release package

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tag
        id: prep
        run: |
          echo "DATE_TAG=$(date +'%Y%m%d-%H%M%S')" >> "$GITHUB_ENV"
          echo "SHA_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push main-only-frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: frontend-runtime
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-only-frontend-${{ env.DATE_TAG }}-${{ env.SHA_TAG }}

      - name: Build and push main-only-backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: backend-runtime
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-only-backend-${{ env.DATE_TAG }}-${{ env.SHA_TAG }}

      - name: Build and push main image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ env.DATE_TAG }}-${{ env.SHA_TAG }}