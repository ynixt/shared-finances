server:
  http2:
    enabled: true

spring:
  application:
    name: shared-finances
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  r2dbc:
    url: mock
    username: mock
    password: mock
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30s
      max-create-connection-time: 5s
      max-acquire-time: 10s
      validation-query: SELECT 1
      acquire-retry: 2
  flyway:
    url: mock
    user: mock
    password: mock
    locations: classpath:db/migration
    baseline-on-migrate: true
    fail-on-missing-locations: false
    clean-disabled: false
  data:
    redis:
      host: mock
      port: 1
      password: mock
      database: 0
      ssl:
        enabled: false
      timeout: 3s
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 16
          min-idle: 0
          max-wait: 5s
  web:
    error:
      include-message: always

db-scheduler:
  enabled: false

springdoc:
  show-actuator: true
  api-docs:
    path: /open/docs/v3
  swagger-ui:
    path: /open/docs

management:
  endpoints:
    web:
      base-path: /open/actuator
  health:
    mail:
      enabled: false

app:
  public-web:
    base-url: http://localhost:4200
  auth:
    features:
      email-confirmation-enabled: false
      password-recovery-enabled: true
      turnstile-enabled: false
    email-confirmation:
      ttl-minutes: 180
    password-recovery:
      ttl-minutes: 60
    email-resend:
      cooldown-seconds: 60
    turnstile:
      secret-key: test-turnstile-secret
    transactional-mail:
      provider-priority: ${SF_APP_TX_MAIL_PROVIDER_PRIORITY:smtp,brevo}
      smtp:
        from-address: noreply@test.local
      brevo:
        daily-quota: 300
        api-key: ""
  legal:
    terms-version: test-terms-1
    privacy-version: test-privacy-1
  nats:
    url: mock
  invitationExpirationMinutes: ${SF_APP_INVITATION_EXPIRATION_MINUTES:15}
  security:
    jwt:
      publicKeyBase64: ${SF_APP_JWT_PUBLIC_KEY}
      privateKeyBase64: ${SF_APP_JWT_PRIVATE_KEY}
      kid: ${SF_APP_JWT_KID:1}
      issuer: ${SF_APP_JWT_ISSUER}
      accessTokenTTLMinutes: ${SF_APP_JWT_ACCESS_TOKEN_TTL_MINUTES:15}
      refreshTokenTTLMinutes: ${SF_APP_JWT_REFRESH_TOKEN_TTL_MINUTES:43200}
    wrongPasswordTtlMinutes: ${SF_APP_WRONG_PASSWORD_TTL_MINUTES:120}
    wrongPasswordBlock: ${SF_APP_WRONG_PASSWORD_BLOCK:10}
    secureCookie: ${SF_APP_SECURE_COOKIE:false}
    mfa:
      crypto:
        password: ${SF_APP_MFA_TOTP_CRYPTO_PASSWORD}
        saltHex: ${SF_APP_MFA_TOTP_CRYPTO_SALT_HEX}
  s3:
    endpoint: ${SF_APP_S3_ENDPOINT}
    accessKey: ${SF_APP_S3_ACCESS_KEY_ID}
    secretKey: ${SF_APP_S3_SECRET_ACCESS_KEY}
    region: ${SF_APP_S3_REGION}
    bucket: ${SF_APP_S3_BUCKET}
    pathStyleAccessEnabled: ${SF_APP_S3_PATH_STYLE_ACCESS_ENABLED:true}
  exchangeRates:
    providerUrl: http://localhost/mock-exchange
  jobs:
    unconfirmedAccountCleanup:
      cron: "0 0 0 * * *"
    simulation:
      reconcile:
        cron-enabled: false
        cron: "0 */2 * * * *"
      purge:
        cron: "0 30 3 * * *"
