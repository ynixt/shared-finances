server:
  port: ${SF_APP_PORT}
  http2:
    enabled: true

spring:
  application:
    name: shared-finances
  r2dbc:
    url: r2dbc:${SF_APP_POSTGRES_CONNECTION_STRING}
    username: ${SF_APP_POSTGRES_USER}
    password: ${SF_APP_POSTGRES_PASSWORD}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30s
      max-create-connection-time: 5s
      max-acquire-time: 10s
      validation-query: SELECT 1
      acquire-retry: 2
  flyway:
    url: jdbc:${SF_APP_POSTGRES_CONNECTION_STRING}
    user: ${SF_APP_POSTGRES_USER}
    password: ${SF_APP_POSTGRES_PASSWORD}
    locations: classpath:db/migration
    baseline-on-migrate: true
    fail-on-missing-locations: false
#    clean-disabled: false
  data:
    redis:
      host: ${SF_APP_REDIS_HOST}
      port: ${SF_APP_REDIS_PORT}
      password: ${SF_APP_REDIS_PASSWORD:}
      database: 0
      ssl:
        enabled: false
      timeout: 3s
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 16
          min-idle: 0
          max-wait: 5s
  web:
    error:
      include-message: always
#  graphql:
#    graphiql:
#      enabled: true
#      path: /open/graphiql

springdoc:
  show-actuator: true
  api-docs:
    path: /open/docs/v3
  swagger-ui:
    path: /open/docs

management:
  endpoints:
    web:
      base-path: /open/actuator

logging:
  level:
    #org.springframework.web: TRACE
#    org.springframework.security: TRACE
#    reactor.netty.http.server: DEBUG
    io.r2dbc.postgresql.QUERY: ${SF_APP_DEBUG_QUERY_LEVEL:INFO}
    io.r2dbc.postgresql.PARAM: ${SF_APP_DEBUG_QUERY_LEVEL:INFO}

app:
  nats:
    url: nats://${SF_APP_NATS_HOST}:${SF_APP_NATS_PORT}
  invitationExpirationMinutes: ${SF_APP_INVITATION_EXPIRATION_MINUTES:15}
  security:
    jwt:
      publicKeyBase64: ${SF_APP_JWT_PUBLIC_KEY}
      privateKeyBase64: ${SF_APP_JWT_PRIVATE_KEY}
      kid: ${SF_APP_JWT_KID}
      issuer: ${SF_APP_JWT_ISSUER}
      accessTokenTTLMinutes: ${SF_APP_JWT_ACCESS_TOKEN_TTL_MINUTES:15}
      refreshTokenTTLMinutes: ${SF_APP_JWT_REFRESH_TOKEN_TTL_MINUTES:43200}
    wrongPasswordTtlMinutes: ${SF_APP_WRONG_PASSWORD_TTL_MINUTES:120}
    wrongPasswordBlock: ${SF_APP_WRONG_PASSWORD_BLOCK:10}
    secureCookie: ${SF_APP_SECURE_COOKIE:true}
    mfa:
      crypto:
        password: ${SF_APP_MFA_TOTP_CRYPTO_PASSWORD}
        saltHex: ${SF_APP_MFA_TOTP_CRYPTO_SALT_HEX}
  s3:
    endpoint: ${SF_APP_S3_ENDPOINT}
    accessKey: ${SF_APP_S3_ACCESS_KEY_ID}
    secretKey: ${SF_APP_S3_SECRET_ACCESS_KEY}
    region: ${SF_APP_S3_REGION}
    bucket: ${SF_APP_S3_BUCKET}
    pathStyleAccessEnabled: ${SF_APP_S3_PATH_STYLE_ACCESS_ENABLED:true}
  exchangeRates:
    providerUrl: ${SF_APP_EXCHANGE_RATES_PROVIDER_URL:https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@}
  jobs:
    refreshExchangeRates:
      cron: ${SF_APP_REFRESH_EXCHANGE_RATES_CRON:0 0 0/12 * * 1}
    materializeGoal:
      cron: ${SF_APP_MATERIALIZE_GOAL_CRON:0 0 0 * * *}
    generateEntry:
      cron: ${SF_APP_GENERATE_ENTRY_CRON:0 0 0 * * *}
    expireMfa:
      cron: ${SF_APP_EXPIRE_MFA_CRON:0 0 0/12 * * *}
    expireInvites:
      cron: ${SF_APP_EXPIRE_INVITES_CRON:0 0/30 * * * *}
    simulation:
      reconcile:
        cron-enabled: ${SF_APP_SIMULATION_RECONCILE_CRON_ENABLED:false}
        cron: ${SF_APP_SIMULATION_RECONCILE_CRON:0 */2 * * * *}
      purge:
        cron: ${SF_APP_SIMULATION_PURGE_CRON:0 30 3 * * *}
