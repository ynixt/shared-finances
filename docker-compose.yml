name: shared-finances-production

services:
  shared-finances:
    image: ghcr.io/ynixt/shared-finances:main-20260422-044205-8591ecf
#    build:
#      context: .
#      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 45s
    env_file:
      - .env.production
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-mc:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/api/open/actuator/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s
    volumes:
      - letsencrypt-data:/etc/letsencrypt

  db:
    image: postgres:18.1-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ROOT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_APP_USER: ${SF_APP_POSTGRES_USER}
      POSTGRES_APP_PASSWORD: ${SF_APP_POSTGRES_PASSWORD}
      POSTGRES_APP_DB: ${SF_APP_POSTGRES_DB}
      POSTGRES_PGHERO_USER: ${POSTGRES_PGHERO_USER}
      POSTGRES_PGHERO_PASSWORD: ${POSTGRES_PGHERO_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ROOT_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      retries: 5
    command:
      - "postgres"
      # Needed for pghero
      - "-c"
      - "shared_preload_libraries=pg_stat_statements,auto_explain"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "logging_collector=on"
      - "-c"
      - "log_min_duration_statement=200ms"
      - "-c"
      - "auto_explain.log_min_duration=500ms"
      - "-c"
      - "auto_explain.log_analyze=on"
      - "-c"
      - "auto_explain.log_buffers=on"
      - "-c"
      - "auto_explain.log_timing=off"

  pghero:
    image: ankane/pghero:v3.8.0
    restart: unless-stopped
    profiles: ["ops"]
    environment:
      SHARED_FINANCES_URL: postgres://${POSTGRES_PGHERO_USER}:${POSTGRES_PGHERO_PASSWORD}@db:${POSTGRES_PORT}/${SF_APP_POSTGRES_DB}
      PGHERO_USERNAME: ${PGHERO_USER}
      PGHERO_PASSWORD: ${PGHERO_PASSWORD}
    ports:
      - "{PGHERO_PORT:-8083}:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./docker/pghero.yml:/app/config/pghero.yml:ro

  redis:
    image: redis:8.4.0-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio-mc:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init-minio.sh"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
      BUCKET: ${SF_APP_S3_BUCKET}
    volumes:
      - ./docker/minio/init-minio.sh:/init-minio.sh:ro

  nats:
    image: nats:2.12.4-alpine
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf"]
    environment:
      NATS_APP_USER: ${NATS_USER}
      NATS_APP_PASSWORD: ${NATS_PASSWORD}
    volumes:
      - ./docker/nats/nats.conf:/etc/nats/nats.conf:ro
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db-data:
  redis_data:
  minio_data:
  nats_data:
  letsencrypt-data:
