dsn: ${DSN}                              # → vem do docker-compose

session:
  whoami:
    tokenizer:
      templates:
        default_jwt:
          jwks_url: file:///etc/kratos/es256.jwks.json
          ttl: 10m
          claims_mapper_url: file:///etc/kratos/jwt-claims.jsonnet

serve:
  public:
    base_url: http://kratos:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:4200
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
      exposed_headers:
        - Content-Type
        - Set-Cookie
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: http://localhost:4200/
  allowed_return_urls:
    - http://localhost:4200/
    - http://localhost:4200/*
    - /           # para navegação relativa dentro do mesmo host

  flows:
    # ---------- LOGIN ----------
    login:
      ui_url: http://localhost:4200/login
      lifespan: 1h
      after:
        default_browser_return_url: http://localhost:4200/app
    logout:
      after:
        default_browser_return_url: http://localhost:4200/login

    # ---------- REGISTRO ----------
    registration:
      enabled: true
      ui_url: http://localhost:4200/register
      lifespan: 1h
      after:
        default_browser_return_url: http://localhost:4200/login
        hooks:
          - hook: web_hook
            config:
              url: http://host.docker.internal:8080/auth/identity-created
              method: POST
              body: file:///etc/kratos/webhooks/registration.jsonnet
              auth:
                type: api_key
                config:
                  name: Authorization
                  value: ${WEBHOOK_SECRET}
                  in: header

    # ---------- SETTINGS (ativa MFA) ----------
    settings:
      ui_url: http://localhost:4200/app/settings/security
      privileged_session_max_age: 1h
      required_aal: aal1
      after:
        default_browser_return_url: http://localhost:4200/

    # ---------- RECOVERY / VERIFICATION ----------
    recovery:
      enabled: false
    verification:
      enabled: false

    error:
      ui_url: http://localhost:4200/auth/error

  methods:
    password:
      enabled: true
      config:
        min_password_length: 6
        haveibeenpwned_enabled: false

    totp:
      enabled: true
      config:
        issuer: "SharedFinances"

    webauthn:
      enabled: true
      config:
        rp:
          display_name: Shared Finances
          id: localhost
          origin: http://localhost:4200


# ---------- Identity schema ----------
identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/kratos/identity.schema.json

# ---------- SMTP STUB (passa na validação) ----------
courier:
  smtp:
    connection_uri: smtp://stub:stub@localhost:25/?skip_ssl_verify=true

log:
  level: info
