services:
  db:
    image: postgres:18.1-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ROOT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_APP_USER: ${SF_APP_POSTGRES_USER}
      POSTGRES_APP_PASSWORD: ${SF_APP_POSTGRES_PASSWORD}
      POSTGRES_APP_DB: ${SF_APP_POSTGRES_DB}
      POSTGRES_PGHERO_USER: ${POSTGRES_PGHERO_USER}
      POSTGRES_PGHERO_PASSWORD: ${POSTGRES_PGHERO_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    ports:
      - ${POSTGRES_PORT}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ROOT_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      retries: 5
    command:
      - "postgres"
      # Needed for pghero
      - "-c"
      - "shared_preload_libraries=pg_stat_statements,auto_explain"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "logging_collector=on"
      - "-c"
      - "log_min_duration_statement=200ms"
      - "-c"
      - "auto_explain.log_min_duration=500ms"
      - "-c"
      - "auto_explain.log_analyze=on"
      - "-c"
      - "auto_explain.log_buffers=on"
      - "-c"
      - "auto_explain.log_timing=off"

  pghero:
    image: ankane/pghero:v3.7.0
    restart: unless-stopped
    environment:
      SHARED_FINANCES_URL: postgres://${PGHERO_USER}:${PGHERO_PASSWORD}@db:${POSTGRES_PORT}/${SF_APP_POSTGRES_DB}
      PGHERO_USERNAME: ${POSTGRES_PGHERO_USER}
      PGHERO_PASSWORD: ${POSTGRES_PGHERO_PASSWORD}
    ports:
      - "8083:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./docker/pghero.yml:/app/config/pghero.yml:ro
  redis:
    image: redis:8.4.0-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
  redis-commander:
    image: ghcr.io/joeferner/redis-commander:0.9.1
    restart: unless-stopped
    environment:
    - REDIS_HOST=${REDIS_COMMANDER_REDIS_HOST}
    - REDIS_PORT=${REDIS_PORT}
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - HTTP_USER=${REDIS_COMMANDER_USER}
    - HTTP_PASSWORD=${REDIS_COMMANDER_PASSWORD}
    ports:
      - "8082:8081"
  mailpit:
    image: axllent/mailpit:v1.22
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    restart: unless-stopped
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30
  minio-mc:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    container_name: minio-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init-minio.sh"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
      BUCKET: ${SF_APP_S3_BUCKET}
    restart: "no"
    volumes:
      - ./docker/minio/init-minio.sh:/init-minio.sh:ro
  nats:
    image: nats:2.12.4-alpine
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - ${NATS_PORT}:4222
      - ${NATS_MONITOR_PORT}:8222
    environment:
      NATS_APP_USER: ${NATS_USER}
      NATS_APP_PASSWORD: ${NATS_PASSWORD}
    volumes:
      - ./docker/nats/nats.conf:/etc/nats/nats.conf:ro
      - nats_data:/data
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
volumes:
  db-data:
  redis_data:
  minio_data:
  nats_data: