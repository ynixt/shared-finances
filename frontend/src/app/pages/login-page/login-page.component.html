<app-navbar></app-navbar>

@if (loginForm && loginResponse?.mfaRequired != true) {
  <form [formGroup]="loginForm" (ngSubmit)="submit()" class="flex flex-col gap-4 w-full max-w-md mx-auto mt-12 px-4 md:px-0">
    <label class="flex flex-col gap-2">
      <span>{{ 'loginPage.email' | translate }}</span>
      <input pInputText formControlName="identifier" />
    </label>

    <label class="flex flex-col gap-2">
      <span class="flex flex-wrap justify-between items-baseline gap-x-2 gap-y-1">
        <span>{{ 'loginPage.password' | translate }}</span>
        @if (openAuthPreferences.passwordRecoveryEnabled()) {
          <a routerLink="/forgot-password" class="text-primary text-sm no-underline hover:underline shrink-0">
            {{ 'loginPage.forgotPassword' | translate }}
          </a>
        }
      </span>
      <p-password fluid formControlName="password" [toggleMask]="true" [feedback]="false" />
    </label>

    <app-turnstile-widget (resolved)="loginTurnstileToken = $event" />

    <button pButton type="submit" [loading]="loading" [disabled]="loginForm.invalid || !loginTurnstileToken">
      {{ 'loginPage.login' | translate }}
    </button>
  </form>
}

@if (loginResponse?.mfaRequired && mfaForm) {
  <form [formGroup]="mfaForm" (ngSubmit)="submitMfa()" class="flex flex-col gap-4 w-full max-w-md mx-auto mt-12">
    <label class="flex flex-col gap-2">
      <span>{{ 'loginPage.2faCode' | translate }}</span>
      <p-input-otp formControlName="code" [integerOnly]="true" [length]="6" [autofocus]="true" (keydown.enter)="submitMfa()" />
    </label>

    <app-turnstile-widget (resolved)="mfaTurnstileToken = $event" />

    <button pButton type="submit" [loading]="loading" [disabled]="mfaForm.invalid || !mfaTurnstileToken">
      {{ 'loginPage.login' | translate }}
    </button>
  </form>
}

<p-toast />
