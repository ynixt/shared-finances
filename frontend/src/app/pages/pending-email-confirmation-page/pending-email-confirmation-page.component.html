<app-navbar></app-navbar>

<div class="max-w-lg mx-auto mt-6 px-4 space-y-6">
  <h1 class="text-xl font-semibold">{{ 'authFlows.pending.title' | translate }}</h1>
  <p class="leading-relaxed whitespace-pre-wrap">{{ 'authFlows.pending.body' | translate: { email: email } }}</p>

  <app-turnstile-widget #turnstile (resolved)="turnstileToken = $event" />

  <form [formGroup]="confirmForm" (ngSubmit)="confirmByCode()" class="space-y-2">
    <label class="flex flex-col gap-2">
      <span>{{ 'authFlows.pending.code' | translate }}</span>

      <p-input-otp #otpInput formControlName="code" [length]="otpLength" [autofocus]="true" (paste)="handleOtpPaste($event)" size="small">
        <ng-template #input let-token let-events="events" let-index="index">
          <input
            #inputElement
            type="text"
            (input)="handleInputOtp($event)"
            (keydown)="otpInputKeydown($event, index, events, inputElement, confirmCodeButton)"
            (paste)="events.paste($event)"
            (focus)="events.focus($event)"
            (blur)="events.blur($event)"
            [attr.value]="token"
            class="p-inputotp-input p-component p-inputtext"
          />
          @if (index === otpLength / 2) {
            <div class="px-4 hidden md:block">
              <i class="pi pi-minus"></i>
            </div>
            <div class="block md:hidden basis-full"></div>
          }
        </ng-template>
      </p-input-otp>
    </label>

    <div class="my-4">
      <p-button
        #confirmCodeButton
        fluid
        type="submit"
        [disabled]="confirmForm.invalid || confirming || !turnstileToken"
        [label]="'authFlows.pending.confirmCode' | translate"
      />
    </div>
  </form>

  <div class="my-4">
    <p-button
      type="button"
      [disabled]="cooldownSeconds > 0 || !turnstileToken"
      [label]="
        cooldownSeconds > 0
          ? ('authFlows.pending.resendIn' | translate: { seconds: cooldownSeconds })
          : ('authFlows.pending.resend' | translate)
      "
      fluid
      (click)="resend()"
      severity="secondary"
    />
  </div>

  <form [formGroup]="changeForm" (ngSubmit)="changeEmail()" class="space-y-2">
    <label class="flex flex-col gap-2">
      <span>{{ 'authFlows.pending.newEmail' | translate }}</span>
      <span class="text-muted text-xs">{{ 'authFlows.pending.newEmailHint' | translate }}</span>
      <input pInputText formControlName="newEmail" type="email" class="w-full" />
    </label>
    <p-button
      fluid
      type="submit"
      severity="secondary"
      [disabled]="changeForm.invalid || !turnstileToken"
      [label]="'authFlows.pending.changeEmail' | translate"
    />
  </form>
</div>

<p-toast />
