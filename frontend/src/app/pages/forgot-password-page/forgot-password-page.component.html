<app-navbar></app-navbar>

<div class="max-w-md mx-auto mt-12 px-4 space-y-4">
  <h1 class="text-xl font-semibold">{{ 'authFlows.forgot.title' | translate }}</h1>
  @if (!submitted) {
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <label class="flex flex-col gap-1">
        <span>{{ 'general.email' | translate }}</span>
        <input pInputText formControlName="email" type="email" class="w-full" />
      </label>
      <app-turnstile-widget (resolved)="turnstileToken = $event" />
      <p-button
        type="submit"
        [disabled]="form.invalid || !turnstileToken"
        [label]="'authFlows.forgot.submit' | translate"
        styleClass="w-full"
      />
    </form>
  } @else {
    <p>{{ 'authFlows.forgot.sent' | translate }}</p>
  }
  <a routerLink="/login" class="text-primary">{{ 'authFlows.forgot.backLogin' | translate }}</a>
</div>

<p-toast />
