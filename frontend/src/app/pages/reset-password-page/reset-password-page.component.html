<app-navbar></app-navbar>

<div class="max-w-md mx-auto mt-12 px-4 space-y-4">
  <h1 class="text-xl font-semibold">{{ 'authFlows.reset.title' | translate }}</h1>
  <p class="text-sm text-surface-600">{{ 'authFlows.reset.hint' | translate }}</p>
  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
    <label class="flex flex-col gap-1">
      <span>{{ 'general.password' | translate }}</span>
      <p-password formControlName="password" [toggleMask]="true" [feedback]="true" styleClass="w-full" [fluid]="true" />
    </label>
    <label class="flex flex-col gap-1">
      <span>{{ 'general.passwordConfirm' | translate }}</span>
      <p-password formControlName="confirmPassword" [toggleMask]="true" [feedback]="false" styleClass="w-full" [fluid]="true" />
    </label>
    <app-turnstile-widget (resolved)="turnstileToken = $event" />
    <p-button type="submit" [disabled]="form.invalid" [label]="'authFlows.reset.submit' | translate" styleClass="w-full" />
  </form>
  <a routerLink="/login" class="text-primary">{{ 'authFlows.reset.backLogin' | translate }}</a>
</div>

<p-toast />
