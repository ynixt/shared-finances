<div class="flex flex-col gap-2 dashboard-card">
  <div class="title flex gap-2">
    @if (faIcon()) {
      <fa-icon class="dashboard-card-icon {{ iconCssColorClass() }}" [icon]="faIcon()"></fa-icon>
    }

    <span class="font-medium mb-4 {{ titleCssColorClass() }}">{{ titleKey() }}</span>
  </div>

  @if (value() != null) {
    <span [class]="'font-medium text-lg ' + valueCssColorClass()">{{ value() }}</span>
  } @else {
    <p-skeleton height="28px" width="89px"></p-skeleton>
  }
</div>
