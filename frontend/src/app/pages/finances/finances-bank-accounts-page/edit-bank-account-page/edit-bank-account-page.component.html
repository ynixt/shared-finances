@if (loading || bankAccount == null || formGroup == null) {
  <p-progress-spinner></p-progress-spinner>
} @else {
  <div class="finances-page edit-bank-account-page">
    <app-finances-title-bar
      [title]="'financesPage.bankAccountsPage.editBankAccountPage.title' | translate: { name: bankAccount.name }"
      closeRouterLink="../.."
    ></app-finances-title-bar>

    <form class="flex flex-col gap-4" [formGroup]="formGroup" (ngSubmit)="submit()">
      <label class="flex flex-col gap-2">
        <span>{{ 'financesPage.bankAccountsPage.name' | translate }}</span>
        <input formControlName="name" pInputText type="text" />
      </label>

      <label class="flex flex-col gap-2">
        <span>{{ 'general.enabled' | translate }}</span>
        <p-toggleswitch formControlName="enabled"></p-toggleswitch>
      </label>

      <label class="flex flex-col gap-2">
        <span>{{ 'financesPage.bankAccountsPage.currency' | translate }}</span>
        <app-currency-selector formControlName="currency"></app-currency-selector>
      </label>

      <button pButton type="submit" [loading]="submitting" [disabled]="formGroup.invalid">{{ 'general.save' | translate }}</button>
    </form>
  </div>
}
