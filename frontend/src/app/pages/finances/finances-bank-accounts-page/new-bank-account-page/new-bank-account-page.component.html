<div class="finances-page new-bank-account-page">
  <app-finances-title-bar
    [title]="'financesPage.bankAccountsPage.newBankAccountPage.title' | translate"
    closeRouterLink=".."
  ></app-finances-title-bar>

  @let user = userService.user();

  @if (user) {
    <form class="flex flex-col gap-4" [formGroup]="formGroup" (ngSubmit)="submit()">
      <label class="flex flex-col gap-2">
        <span>{{ 'financesPage.bankAccountsPage.name' | translate }}</span>
        <input formControlName="name" pInputText type="text" />
      </label>

      <label class="flex flex-col gap-2">
        <span>{{ 'financesPage.bankAccountsPage.newBankAccountPage.initialBalance' | translate }}</span>
        <p-inputnumber formControlName="balance" mode="currency" [currency]="user.defaultCurrency ?? undefined"></p-inputnumber>
      </label>

      <button pButton type="submit" [loading]="submitting" [disabled]="formGroup.invalid">{{ 'general.save' | translate }}</button>
    </form>
  }
</div>
