<div class="finances-page new-credit-card-page">
  <app-finances-title-bar
    [title]="'financesPage.creditCardsPage.newCreditCardPage.title' | translate"
    closeRouterLink=".."
  ></app-finances-title-bar>

  <form class="flex flex-col gap-4" [formGroup]="formGroup" (ngSubmit)="submit()">
    <label class="flex flex-col gap-2">
      <span>{{ 'financesPage.creditCardsPage.name' | translate }} <app-required-field-asterisk></app-required-field-asterisk></span>
      <input formControlName="name" pInputText type="text" />
    </label>

    <label class="flex flex-col gap-2">
      <span>{{ 'financesPage.creditCardsPage.currency' | translate }} <app-required-field-asterisk></app-required-field-asterisk></span>
      <app-currency-selector formControlName="currency"></app-currency-selector>
    </label>

    <label class="flex flex-col gap-2">
      <span>{{ 'financesPage.creditCardsPage.totalLimit' | translate }} <app-required-field-asterisk></app-required-field-asterisk></span>
      <p-inputNumber formControlName="totalLimit" mode="currency" [currency]="currency"></p-inputNumber>
    </label>

    <div class="grid grid-cols-12 gap-4">
      <label class="flex flex-col gap-2 col-span-12 sm:col-span-6">
        <span>{{ 'financesPage.creditCardsPage.dueDay' | translate }} <app-required-field-asterisk></app-required-field-asterisk></span>
        <p-inputNumber formControlName="dueDay" [min]="1" [max]="31"></p-inputNumber>
      </label>

      <label class="flex flex-col gap-2 col-span-12 sm:col-span-6">
        <span
          >{{ 'financesPage.creditCardsPage.daysBetweenDueAndClosing' | translate }}
          <app-required-field-asterisk></app-required-field-asterisk
        ></span>
        <p-inputNumber formControlName="daysBetweenDueAndClosing" [min]="0" [max]="31"></p-inputNumber>
      </label>
    </div>

    <label class="flex items-center gap-4">
      <span
        >{{ 'financesPage.creditCardsPage.dueOnNextBusinessDay' | translate }} <app-required-field-asterisk></app-required-field-asterisk
      ></span>
      <p-toggleswitch formControlName="dueOnNextBusinessDay"></p-toggleswitch>
    </label>

    <label class="flex items-center gap-3 rounded-md border border-surface-200 dark:border-surface-600 dark:bg-surface-900 px-3 py-2">
      <p-toggleswitch formControlName="showOnDashboard"></p-toggleswitch>
      <span>{{ 'financesPage.creditCardsPage.showOnDashboard' | translate }}</span>
    </label>

    <button pButton type="submit" [loading]="submitting" [disabled]="formGroup.invalid">{{ 'general.save' | translate }}</button>
  </form>
</div>
