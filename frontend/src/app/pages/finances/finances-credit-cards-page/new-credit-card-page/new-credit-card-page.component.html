<div class="finances-page new-credit-card-page">
  <app-finances-title-bar
    [title]="'financesPage.creditCardsPage.newCreditCardPage.title' | translate"
    closeRouterLink=".."
  ></app-finances-title-bar>

  <form class="flex flex-col gap-4" [formGroup]="formGroup" (ngSubmit)="submit()">
    <label class="flex flex-col gap-2">
      <span>{{ 'financesPage.creditCardsPage.name' | translate }}</span>
      <input formControlName="name" pInputText type="text" />
    </label>

    <label class="flex flex-col gap-2">
      <span>{{ 'financesPage.creditCardsPage.currency' | translate }}</span>
      <app-currency-selector formControlName="currency"></app-currency-selector>
    </label>

    <label class="flex flex-col gap-2">
      <span>{{ 'financesPage.creditCardsPage.totalLimit' | translate }}</span>
      <p-inputNumber formControlName="totalLimit" mode="currency" [currency]="currency"></p-inputNumber>
    </label>

    <div class="grid grid-cols-12 gap-4">
      <label class="flex flex-col gap-2 col-span-12 sm:col-span-6">
        <span>{{ 'financesPage.creditCardsPage.dueDay' | translate }}</span>
        <p-inputNumber formControlName="dueDay" [min]="1" [max]="31"></p-inputNumber>
      </label>

      <label class="flex flex-col gap-2 col-span-12 sm:col-span-6">
        <span>{{ 'financesPage.creditCardsPage.daysBetweenDueAndClosing' | translate }}</span>
        <p-inputNumber formControlName="daysBetweenDueAndClosing" [min]="0" [max]="31"></p-inputNumber>
      </label>
    </div>

    <label class="flex items-center gap-4">
      <span>{{ 'financesPage.creditCardsPage.dueOnNextBusinessDay' | translate }}</span>
      <p-toggleswitch formControlName="dueOnNextBusinessDay"></p-toggleswitch>
    </label>

    <button pButton type="submit" [loading]="submitting" [disabled]="formGroup.invalid">{{ 'general.save' | translate }}</button>
  </form>
</div>
