<p-confirmDialog />

<app-finances-title-bar
  [title]="goalId == null ? ('financesPage.goalsPage.newTitle' | translate) : ('financesPage.goalsPage.editTitle' | translate)"
  [closeRouterLink]="closeRouterLink"
  [showDeleteButton]="goalId != null"
  [deleteButtonLoading]="deleting"
  (deleteButtonClicked)="confirmDelete()"
></app-finances-title-bar>

@if (initialLoading) {
  <div class="py-8 text-center text-surface-600">{{ 'general.loading' | translate }}</div>
} @else {
  <form [formGroup]="form" (ngSubmit)="save()" class="mt-6 flex flex-col gap-4">
    <div>
      <label class="mb-1 block text-sm font-medium text-secondary" for="g-name"
        >{{ 'general.name' | translate }} <app-required-field-asterisk></app-required-field-asterisk
      ></label>
      <input pInputText id="g-name" formControlName="name" class="w-full" />
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-secondary" for="g-desc">{{
        'financesPage.goalsPage.description' | translate
      }}</label>
      <input pInputText id="g-desc" formControlName="description" class="w-full" />
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-secondary">{{ 'financesPage.goalsPage.columns.deadline' | translate }}</label>
      <app-date-picker formControlName="deadline" class="block w-full" />
    </div>

    <div class="space-y-2">
      <div class="flex items-center justify-between">
        <span class="text-sm font-medium text-secondary"
          >{{ 'financesPage.goalsPage.targets' | translate }} <app-required-field-asterisk></app-required-field-asterisk
        ></span>
        <button pButton type="button" class="p-button-text p-button-sm" (click)="addTarget()" [label]="'general.new' | translate"></button>
      </div>
      @for (row of targets.controls; track $index; let i = $index) {
        <div [formGroup]="$any(row)" class="flex flex-wrap items-end gap-2">
          <app-currency-selector formControlName="currency" class="w-48"></app-currency-selector>
          <p-input-number
            class="min-w-32 flex-1"
            formControlName="targetAmount"
            mode="currency"
            [currency]="$any(row).get('currency').value"
          ></p-input-number>

          @if (targets.length > 1) {
            <button
              pButton
              type="button"
              class="p-button-text p-button-danger p-button-sm"
              (click)="removeTarget(i)"
              [label]="'general.delete' | translate"
            ></button>
          }
        </div>
      }
    </div>

    <button pButton type="submit" [loading]="loading" [label]="'general.save' | translate" [disabled]="form.invalid"></button>
  </form>
}
