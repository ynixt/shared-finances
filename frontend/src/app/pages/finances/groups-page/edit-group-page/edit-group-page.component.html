<div class="finances-page edit-group-page">
  @if (loading || group == null || formGroup == null) {
    <p-progress-spinner></p-progress-spinner>
  } @else {
    <app-finances-title-bar
      [title]="'financesPage.groupsPage.editGroupPage.title' | translate: { name: group.name }"
      closeRouterLink=".."
      [showDeleteButton]="group.permissions.includes(GroupPermissions__Obj.DELETE_GROUP)"
      (deleteButtonClicked)="askForConfirmationToDelete()"
      [deleteButtonLoading]="submitting"
    ></app-finances-title-bar>

    <form class="flex flex-col gap-4" [formGroup]="formGroup" (ngSubmit)="submit()">
      <label class="flex flex-col gap-2">
        <span>{{ 'financesPage.groupsPage.name' | translate }} <app-required-field-asterisk></app-required-field-asterisk></span>
        <input formControlName="name" pInputText type="text" />
      </label>

      <button pButton type="submit" [loading]="submitting" [disabled]="formGroup.invalid">{{ 'general.save' | translate }}</button>
    </form>
  }
</div>

<p-confirm-dialog />
