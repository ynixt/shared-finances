<div class="paged-multi-select">
  <p-multi-select
    #select
    [options]="options"
    [optionLabel]="optionLabel()"
    [filter]="allowFilter()"
    [showClear]="true"
    [placeholder]="placeholder()"
    class="w-full {{ componentClass() }}"
    [disabled]="disabled"
    (onChange)="onSelectionChange($event)"
    [ngModel]="value"
    (onClear)="clearSelection()"
    [virtualScroll]="true"
    [virtualScrollItemSize]="44"
    [virtualScrollOptions]="scrollerOptions()"
    [dataKey]="dataKey()"
    [optionValue]="optionValue()"
    (onPanelShow)="onShow()"
    [showToggleAll]="showToggleAll()"
  >
    <ng-template #loader>
      <div class="p-2">
        <p-skeleton width="100%" height="44px"></p-skeleton>
      </div>
    </ng-template>

    @if (externalItemTemplate) {
      <ng-template let-item #item>
        <ng-container [ngTemplateOutlet]="externalItemTemplate" [ngTemplateOutletContext]="{ $implicit: item, optionLabel: optionLabel() }">
        </ng-container>
      </ng-template>
    }

    @if (externalSelectedItemsTemplate) {
      <ng-template let-selectedOptions let-removeChip="removeChip" #selecteditems>
        <ng-container
          [ngTemplateOutlet]="externalSelectedItemsTemplate"
          [ngTemplateOutletContext]="{ $implicit: selectedOptions, removeChip: removeChip, optionLabel: optionLabel() }"
        >
        </ng-container>
      </ng-template>
    }

    @if (!filterInMemory()) {
      <ng-template #filter>
        <div class="w-full p-2 bg-surface-0">
          <p-iconfield>
            <input
              pInputText
              type="text"
              class="w-full"
              [formControl]="searchControl"
              role="searchbox"
              autocomplete="off"
              (click)="select.onInputClick($event)"
              (keydown)="select.onFilterKeyDown($event)"
              (blur)="select.onFilterBlur($event)"
            />
            <p-inputicon class="pi pi-search" />
          </p-iconfield>
        </div>
      </ng-template>
    }
  </p-multi-select>
</div>
