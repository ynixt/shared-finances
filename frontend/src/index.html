<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SharedFinances</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root>
      <div class="loading flex justify-center items-center w-screen h-screen p-4">
        <style>
          .p-progressspinner-circle {
            height: 100%;
            transform-origin: center center;
            width: 100%;
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
            animation: p-progressspinner-rotate 2s linear infinite;
            animation-duration: 2s;
          }

          @keyframes p-progresspinner-rotate {
            100% {
              transform: rotate(360deg);
            }
          }
        </style>

        <div class="p-40 h-40">
          <svg viewBox="25 25 50 50" data-pc-section="spin" class="p-progressspinner-circle">
            <circle
              cx="50"
              cy="50"
              r="20"
              stroke-miterlimit="10"
              class="p-progressspinner-circle"
              fill="none"
              stroke-width="2"
              data-pc-section="circle"
            ></circle>
          </svg>
        </div>
        <p-progressSpinner class="w-40 h-40"></p-progressSpinner>
      </div>
    </app-root>
  </body>
</html>
